apiVersion: v1
kind: ServiceAccount
metadata:
  name: model-server
  namespace: {{ .Release.Namespace }}
  annotations:
    # IRSA role from terraform/iam.tf - scoped to read-only access on the
    # model artifacts S3 prefix, nothing else. Set via
    # `helm upgrade --set serviceAccountRoleArn=...` or a values override.
    eks.amazonaws.com/role-arn: {{ .Values.serviceAccountRoleArn | default "" | quote }}
