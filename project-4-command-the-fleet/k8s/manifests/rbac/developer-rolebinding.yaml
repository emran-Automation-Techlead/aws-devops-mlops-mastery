# RoleBinding exists in dev and staging - deliberately NOT in production.
# Kubernetes RBAC is deny-by-default: with no RoleBinding granting the
# "developers" group anything in the production namespace, they have
# ZERO access there - not read-only, not limited, literally nothing,
# without a single explicit "deny" rule anywhere. This is the actual
# mechanism behind "developers cannot touch production."
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: developers-can-edit
  namespace: dev
subjects:
  - kind: Group
    name: developers
    apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: ClusterRole
  name: developer
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: developers-can-edit
  namespace: staging
subjects:
  - kind: Group
    name: developers
    apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: ClusterRole
  name: developer
  apiGroup: rbac.authorization.k8s.io
# No equivalent RoleBinding for the "production" namespace exists in
# this repo, anywhere. That absence IS the security control.
