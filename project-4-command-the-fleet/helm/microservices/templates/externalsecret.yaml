# SecretStore: tells External Secrets Operator WHERE to read from
# (AWS Secrets Manager, authenticating via the external-secrets IRSA role
# from infrastructure/eks/irsa.tf). One per namespace, since each
# namespace's ESO ServiceAccount is what actually assumes the IAM role.
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: aws-secrets-manager
  namespace: {{ .Release.Namespace }}
spec:
  provider:
    aws:
      service: SecretsManager
      region: {{ .Values.awsRegion }}
      auth:
        jwt:
          serviceAccountRef:
            name: external-secrets
            namespace: external-secrets
---
# ExternalSecret: the actual sync job. ESO polls Secrets Manager every
# refreshInterval and writes/updates a REAL Kubernetes Secret from it -
# the app (order-service, via secretEnv in values.yaml) only ever reads
# a normal k8s Secret, with no idea AWS is even involved.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: app-config
  namespace: {{ .Release.Namespace }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: SecretStore
  target:
    name: app-config
  data:
    - secretKey: example_api_key
      remoteRef:
        key: command-the-fleet/app-config
        property: example_api_key
