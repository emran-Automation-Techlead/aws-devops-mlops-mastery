# GitHub only reads workflow files from the REPO ROOT .github/workflows/,
# never from a subfolder - so even though this belongs to "Project 2", it
# has to live here. The path filters below scope it to only fire on
# changes inside project-2-robot-builder/, so it doesn't run on every
# commit to the other 4 projects in this monorepo.
name: Project 2 - Robot Builder CI

on:
  push:
    branches: [master, main]
    paths:
      - "project-2-robot-builder/**"
  pull_request:
    paths:
      - "project-2-robot-builder/**"

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: project-2-robot-builder/app

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: project-2-robot-builder/app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test -- --ci --coverage

      # This is the "robot" that blocks bad code: set this job as a
      # required status check under Settings -> Branches -> Branch
      # protection rules for master/main, and GitHub won't allow a merge
      # until it passes - regardless of what CodePipeline does downstream.
      - name: Lint
        run: npm run lint --if-present
