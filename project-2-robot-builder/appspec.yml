# Read by the CodeDeploy agent running on each EC2 instance. Defines where
# the deployed files land and which script runs at each lifecycle hook.
version: 0.0
os: linux

files:
  - source: /
    destination: /home/ec2-user/app

permissions:
  - object: /home/ec2-user/app
    pattern: "**"
    owner: ec2-user
    group: ec2-user

hooks:
  # Runs first, on EVERY deployment - including the very first one, when
  # nothing is running yet. Scripts must handle that "nothing to stop" case
  # without failing.
  ApplicationStop:
    - location: scripts/stop_server.sh
      timeout: 30
      runas: root

  BeforeInstall:
    - location: scripts/install_dependencies.sh
      timeout: 300
      runas: root

  AfterInstall:
    - location: scripts/install_npm_packages.sh
      timeout: 180
      runas: root

  ApplicationStart:
    - location: scripts/start_server.sh
      timeout: 60
      runas: root

  # If this hook fails, CodeDeploy marks the whole deployment FAILED and
  # (with auto_rollback_configuration enabled in Terraform) automatically
  # rolls back - this is the safety net that stops broken code from ever
  # serving real traffic.
  ValidateService:
    - location: scripts/validate_service.sh
      timeout: 60
      runas: root
